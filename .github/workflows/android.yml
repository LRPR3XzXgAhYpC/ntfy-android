name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. 编译 Release APK
    - name: Build F-Droid Release APK
      run: ./gradlew assembleFdroidRelease --stacktrace

    # 2. 自动生成密钥并签名（无需手动配置 Secrets）
    - name: Sign Release APK
      uses: rromang/action-sing-apk@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/fdroid/release

    # 3. 上传签名好的 APK（位于 signed 目录下）
    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: ntfy-quiet-hours-release-signed
        path: app/build/outputs/apk/fdroid/release/signed/*.apk
