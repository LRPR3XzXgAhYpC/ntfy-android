name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. 编译 Release APK
    - name: Build F-Droid Release APK
      run: ./gradlew assembleFdroidRelease --stacktrace

    # 2. 自动签名（无需任何配置，自动搞定）
    - name: Sign Release APK
      uses: r3d-soft/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/fdroid/release

    # 3. 上传可以直接安装的 Release APK
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: ntfy-quiet-hours-release-signed
        path: ${{ steps.sign_app.outputs.signedFile }}
