name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. 编译 Release APK
    - name: Build F-Droid Release APK
      run: ./gradlew assembleFdroidRelease --stacktrace

    # 2. 使用 Android 官方工具进行原生签名（无需任何第三方 Action，绝对不报错）
    - name: Sign APK with Native Android Tools
      run: |
        # 生成临时的证书密钥
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        
        # 寻找预装的 apksigner 工具并完成 APK 签名
        APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | head -n 1)
        $APKSIGNER sign --ks debug.keystore --ks-pass pass:android app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk
        
        # 重命名为最终可安装的文件
        mv app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk app/build/outputs/apk/fdroid/release/app-fdroid-release-signed.apk

    # 3. 上传可以直接安装的 Release APK
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: ntfy-quiet-hours-release-signed
        path: app/build/outputs/apk/fdroid/release/app-fdroid-release-signed.apk
